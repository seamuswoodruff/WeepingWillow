# ─── Netlify Configuration for Next.js (honeysuckle-site) ───────────────────

[build]
  # If your GitHub repo root is the parent folder (e.g. HoneySuckle/),
  # uncomment the line below so Netlify runs the build inside this subfolder:
  # base    = "honeysuckle-site"
  #
  # If your GitHub repo root IS this folder (honeysuckle-site/), leave it commented.
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js on Netlify requires the Next.js Runtime plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Redirects / Headers ────────────────────────────────────────────────────

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Long-lived cache for Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for public images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
